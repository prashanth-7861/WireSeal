name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          # TODO: switch to `pip install --require-hashes -r requirements.txt && pip install -e . --no-deps`
          # after `pip-compile --generate-hashes --output-file=requirements.txt requirements.in`
          # and an equivalent requirements-dev.txt are committed. See Fix 3 in security audit.
          pip install -e ".[dev]"
      - name: Audit production dependencies for CVEs
        run: |
          # pygments 2.19.2 — no fix released yet (dev-only, pinned by pip-audit itself)
          # pytest 8.4.2 CVE-2025-71176 — dev-only; fix in 9.x which has breaking changes for our plugin matrix
          pip-audit \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-71176
      - name: Run unit tests
        run: pytest --tb=short -q -m "not integration"
        env:
          WG_ENFORCE_TIMING: "1"
      - name: Run integration tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pytest --tb=short -q -m integration
        env:
          DOCKER_BUILDKIT: "1"

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@v4  # TODO-SHA-PIN
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build GUI binary
        run: pyinstaller wireseal.spec

      - name: Build CLI binary
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries
        shell: bash
        run: |
          # Windows GUI is built as PyInstaller onedir (dist/WireSeal/) to avoid
          # the onefile bootloader's unreliable pywebview extraction. Zip the
          # whole tree as a single CI artifact for smoke testing downstream jobs.
          mkdir -p dist/release
          python -c "
          import shutil
          shutil.make_archive('dist/release/WireSeal-windows-x86_64-onedir', 'zip', 'dist', 'WireSeal')
          "
          cp dist/wireseal-cli.exe dist/release/wireseal-cli-windows-x86_64.exe

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: binaries-windows
          path: dist/release/

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@v4  # TODO-SHA-PIN
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build GUI binary
        run: pyinstaller wireseal.spec

      - name: Build CLI binary
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries
        run: |
          mkdir -p dist/release
          cp dist/WireSeal dist/release/WireSeal-macos-arm64
          cp dist/wireseal-cli dist/release/wireseal-cli-macos-arm64

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: binaries-macos
          path: dist/release/
