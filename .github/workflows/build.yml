name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Audit production dependencies for CVEs
        run: pip-audit
      - name: Run unit tests
        run: pytest --tb=short -q -m "not integration"
        env:
          WG_ENFORCE_TIMING: "1"
      - name: Run integration tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pytest --tb=short -q -m integration
        env:
          DOCKER_BUILDKIT: "1"

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_artifact: WireSeal-linux-x86_64
            cli_artifact: wireseal-cli-linux-x86_64
          - os: macos-latest
            gui_artifact: WireSeal-macos-arm64
            cli_artifact: wireseal-cli-macos-arm64
          - os: windows-latest
            gui_artifact: WireSeal-windows-x86_64.exe
            cli_artifact: wireseal-cli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - name: Install Linux GTK/WebKit system deps (for pywebview GUI)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgirepository-2.0-dev \
            gir1.2-webkit2-4.1 \
            gir1.2-gtk-3.0 \
            gir1.2-glib-2.0 \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-pango-1.0 \
            libcairo2-dev \
            pkg-config \
            || sudo apt-get install -y \
              libwebkit2gtk-4.0-dev \
              libgirepository1.0-dev \
              gir1.2-webkit2-4.0 \
              gir1.2-gtk-3.0 \
              gir1.2-glib-2.0 \
              gir1.2-gdkpixbuf-2.0 \
              gir1.2-pango-1.0 \
              libcairo2-dev \
              pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install PyGObject (Linux only — GTK bindings for pywebview)
        if: runner.os == 'Linux'
        run: |
          # PyGObject >=3.52 requires GIRepository 3.0 typelib which Ubuntu 24.04
          # doesn't ship. Pin to 3.50.x which works with GIRepository 2.0.
          pip install 'PyGObject>=3.50,<3.52'

      - name: Build GUI binary
        run: pyinstaller wireseal.spec

      - name: Build CLI binary
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries for upload
        shell: bash
        run: |
          mkdir -p dist/release
          # GUI binary (WireSeal / WireSeal.exe)
          find dist -maxdepth 1 \( -name "WireSeal" -o -name "WireSeal.exe" \) | \
            xargs -I{} cp {} dist/release/${{ matrix.gui_artifact }}
          # CLI binary (wireseal / wireseal.exe)
          find dist -maxdepth 1 \( -name "wireseal-cli" -o -name "wireseal-cli.exe" \) | \
            xargs -I{} cp {} dist/release/${{ matrix.cli_artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/release/
