name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Audit production dependencies for CVEs
        run: pip-audit
      - name: Run unit tests
        run: pytest --tb=short -q -m "not integration"
        env:
          WG_ENFORCE_TIMING: "1"
      - name: Run integration tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pytest --tb=short -q -m integration
        env:
          DOCKER_BUILDKIT: "1"

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build GUI binary
        run: pyinstaller wireseal.spec

      - name: Build CLI binary
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/WireSeal.exe dist/release/WireSeal-windows-x86_64.exe
          cp dist/wireseal-cli.exe dist/release/wireseal-cli-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: dist/release/

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build GUI binary
        run: pyinstaller wireseal.spec

      - name: Build CLI binary
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries
        run: |
          mkdir -p dist/release
          cp dist/WireSeal dist/release/WireSeal-macos-arm64
          cp dist/wireseal-cli dist/release/wireseal-cli-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: dist/release/
