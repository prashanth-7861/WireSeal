name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build GUI + CLI binaries (PyInstaller one-file, dashboard bundled)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_name: WireSeal-linux-x86_64
            cli_name: wireseal-cli-linux-x86_64
          - os: macos-latest
            gui_name: WireSeal-macos-arm64
            cli_name: wireseal-cli-macos-arm64
          - os: windows-latest
            gui_name: WireSeal-windows-x86_64.exe
            cli_name: wireseal-cli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - name: Install Linux GTK/WebKit system deps (for pywebview GUI)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgirepository-2.0-dev \
            gir1.2-webkit2-4.1 \
            gir1.2-gtk-3.0 \
            libcairo2-dev \
            pkg-config \
            || sudo apt-get install -y \
              libwebkit2gtk-4.0-dev \
              libgirepository1.0-dev \
              gir1.2-webkit2-4.0 \
              gir1.2-gtk-3.0 \
              libcairo2-dev \
              pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with all dependencies
        run: pip install -e ".[dev]"

      - name: Install PyGObject (Linux only — GTK bindings for pywebview)
        if: runner.os == 'Linux'
        run: pip install PyGObject

      - name: Install pythonnet + pystray (Windows only — WinForms backend for pywebview)
        if: runner.os == 'Windows'
        run: pip install pythonnet clr-loader pystray Pillow

      - name: Run unit tests before release build
        run: pytest --tb=short -q -m "not integration"
        env:
          WG_ENFORCE_TIMING: "1"

      - name: Verify pywebview backend (Windows — WinForms, Linux — GTK)
        shell: bash
        run: |
          python -c "
          import sys
          if sys.platform == 'win32':
              import clr_loader
              print('clr_loader OK')
              from webview.platforms import winforms
              print('WinForms backend OK')
          elif sys.platform == 'linux':
              import gi
              print('PyGObject OK')
          import webview
          print('pywebview OK')
          "

      - name: Build GUI binary (desktop app)
        run: pyinstaller wireseal.spec

      - name: Verify webview in onedir tree (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Windows uses onedir mode — the webview package is staged to disk
          # inside dist/WireSeal/_internal/webview/ and imported via normal
          # sys.path at runtime. Verify it exists before packaging.
          python -c "
          import os, sys
          app_dir = 'dist/WireSeal'
          if not os.path.isdir(app_dir):
              print(f'FATAL: onedir output missing: {app_dir}')
              sys.exit(1)
          wv_init_candidates = [
              os.path.join(app_dir, '_internal', 'webview', '__init__.py'),
              os.path.join(app_dir, 'webview', '__init__.py'),
          ]
          found = None
          for c in wv_init_candidates:
              if os.path.isfile(c):
                  found = c
                  break
          if not found:
              print('FATAL: webview/__init__.py not found in onedir tree')
              for root, dirs, files in os.walk(app_dir):
                  if 'webview' in root.lower():
                      print(f'  {root}: {files[:5]}')
              sys.exit(1)
          print(f'OK: webview package located at {found}')
          wv_dir = os.path.dirname(found)
          py_files = [f for f in os.listdir(wv_dir) if f.endswith('.py')]
          print(f'     webview/ contains {len(py_files)} .py files')
          exe = os.path.join(app_dir, 'WireSeal.exe')
          if os.path.isfile(exe):
              print(f'     WireSeal.exe: {os.path.getsize(exe):,} bytes')
          "

      - name: Build CLI binary (terminal)
        run: pyinstaller wireseal-cli.spec

      - name: Stage binaries (Linux/macOS — onefile)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/release
          find dist -maxdepth 1 \( -name "WireSeal" \) \
            -exec cp {} dist/release/${{ matrix.gui_name }} \;
          find dist -maxdepth 1 \( -name "wireseal-cli" \) \
            -exec cp {} dist/release/${{ matrix.cli_name }} \;

      - name: Stage binaries (Windows — onedir GUI + onefile CLI)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/release
          # CLI is still onefile (no pywebview dependency) — stage as before
          cp dist/wireseal-cli.exe "dist/release/${{ matrix.cli_name }}"
          # GUI is onedir — zip the whole directory for downstream consumption.
          # The NSIS packaging job unzips this and uses `File /r` to install it.
          python -c "
          import shutil
          shutil.make_archive('dist/release/WireSeal-windows-x86_64-onedir', 'zip', 'dist', 'WireSeal')
          "
          ls -lh dist/release/

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/release/

  # ─────────────────────────────────────────────────────────────────────────
  # 2a. Linux packages — .deb / .rpm / .tar.gz (includes GUI + CLI)
  # ─────────────────────────────────────────────────────────────────────────
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-ubuntu-latest
          path: dist/release

      - name: Make binaries executable
        run: |
          chmod +x dist/release/WireSeal-linux-x86_64
          chmod +x dist/release/wireseal-cli-linux-x86_64

      - name: Compute version (strip leading 'v')
        id: ver
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Install fpm and rpm tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Prepare payload directory
        run: |
          # GUI binary
          mkdir -p pkg_root/usr/local/bin
          cp dist/release/WireSeal-linux-x86_64 pkg_root/usr/local/bin/WireSeal
          chmod +x pkg_root/usr/local/bin/WireSeal

          # CLI binary
          cp dist/release/wireseal-cli-linux-x86_64 pkg_root/usr/local/bin/wireseal
          chmod +x pkg_root/usr/local/bin/wireseal

          # Desktop entry (app menu integration)
          mkdir -p pkg_root/usr/share/applications
          cp assets/wireseal.desktop pkg_root/usr/share/applications/wireseal.desktop

          # Application icon
          mkdir -p pkg_root/usr/share/icons/hicolor/256x256/apps
          cp assets/wireseal.png pkg_root/usr/share/icons/hicolor/256x256/apps/wireseal.png

      - name: Build .deb package (Debian / Ubuntu)
        run: |
          fpm \
            -s dir \
            -t deb \
            -C pkg_root \
            --name wireseal \
            --version "${{ steps.ver.outputs.version }}" \
            --architecture amd64 \
            --description "WireGuard server automation with zero plaintext secrets on disk" \
            --url "https://github.com/prashanth-7861/WireSeal" \
            --maintainer "WireSeal Contributors <noreply@github.com>" \
            --license MIT \
            --category net \
            --depends wireguard-tools \
            --depends "libwebkit2gtk-4.0-37 | libwebkit2gtk-4.1-0" \
            --deb-priority optional \
            --package "dist/release/wireseal_${{ steps.ver.outputs.version }}_amd64.deb" \
            .

      - name: Build .rpm package (Fedora / RHEL / Rocky / openSUSE)
        run: |
          fpm \
            -s dir \
            -t rpm \
            -C pkg_root \
            --name wireseal \
            --version "${{ steps.ver.outputs.version }}" \
            --architecture x86_64 \
            --description "WireGuard server automation with zero plaintext secrets on disk" \
            --url "https://github.com/prashanth-7861/WireSeal" \
            --maintainer "WireSeal Contributors <noreply@github.com>" \
            --license MIT \
            --category "Applications/Internet" \
            --depends wireguard-tools \
            --depends webkit2gtk3 \
            --package "dist/release/wireseal-${{ steps.ver.outputs.version }}-1.x86_64.rpm" \
            .

      - name: Build .tar.gz (Arch Linux / Alpine / generic)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          tar -czf "dist/release/wireseal-${VERSION}-linux-x86_64.tar.gz" \
            -C pkg_root/usr/local/bin WireSeal wireseal

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/release/*.deb
            dist/release/*.rpm
            dist/release/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # 2b. macOS — .app bundle in .pkg installer + .tar.gz
  # ─────────────────────────────────────────────────────────────────────────
  package-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos-latest
          path: dist/release

      - name: Make binaries executable
        run: |
          chmod +x dist/release/WireSeal-macos-arm64
          chmod +x dist/release/wireseal-cli-macos-arm64

      - name: Compute version
        id: ver
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Create .app bundle
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          APP="dist/release/WireSeal.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp dist/release/WireSeal-macos-arm64 "$APP/Contents/MacOS/WireSeal"
          chmod +x "$APP/Contents/MacOS/WireSeal"

          # Create .icns from PNG
          ICONSET="$RUNNER_TEMP/WireSeal.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/wireseal-1024.png --out "$ICONSET/icon_${size}x${size}.png" > /dev/null
            double=$((size * 2))
            if [ $double -le 1024 ]; then
              sips -z $double $double assets/wireseal-1024.png --out "$ICONSET/icon_${size}x${size}@2x.png" > /dev/null
            fi
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/WireSeal.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>WireSeal</string>
            <key>CFBundleDisplayName</key>
            <string>WireSeal</string>
            <key>CFBundleIdentifier</key>
            <string>com.wireseal.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>WireSeal</string>
            <key>CFBundleIconFile</key>
            <string>WireSeal</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Build .pkg installer (GUI .app + CLI symlink)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          mkdir -p payload/Applications
          cp -R dist/release/WireSeal.app payload/Applications/

          # CLI binary + GUI symlink
          mkdir -p payload/usr/local/bin
          cp dist/release/wireseal-cli-macos-arm64 payload/usr/local/bin/wireseal
          chmod +x payload/usr/local/bin/wireseal

          pkgbuild \
            --root payload \
            --identifier com.wireseal.app \
            --version "$VERSION" \
            --install-location / \
            dist/release/wireseal-component.pkg

          cat > /tmp/distribution.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>WireSeal</title>
            <options customize="never" require-scripts="false" hostArchitectures="arm64"/>
            <pkg-ref id="com.wireseal.app"/>
            <choices-outline>
              <line choice="com.wireseal.app"/>
            </choices-outline>
            <choice id="com.wireseal.app" visible="false">
              <pkg-ref id="com.wireseal.app"/>
            </choice>
            <pkg-ref id="com.wireseal.app" version="${VERSION}" onConclusion="none">wireseal-component.pkg</pkg-ref>
          </installer-gui-script>
          EOF

          productbuild \
            --distribution /tmp/distribution.xml \
            --package-path dist/release \
            "dist/release/wireseal-${VERSION}-macos-arm64.pkg"

          rm dist/release/wireseal-component.pkg

      - name: Build .tar.gz (includes both GUI and CLI)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p tarball_root/bin
          cp dist/release/WireSeal-macos-arm64 tarball_root/bin/WireSeal
          cp dist/release/wireseal-cli-macos-arm64 tarball_root/bin/wireseal
          chmod +x tarball_root/bin/*
          tar -czf "dist/release/wireseal-${VERSION}-macos-arm64.tar.gz" \
            -C tarball_root/bin WireSeal wireseal

      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            dist/release/*.pkg
            dist/release/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # 2c. Windows — NSIS setup (GUI + CLI) + portable .zip
  # ─────────────────────────────────────────────────────────────────────────
  package-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows-latest
          path: dist/release

      - name: Compute version
        id: ver
        shell: bash
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Install NSIS
        shell: powershell
        run: choco install nsis --yes --no-progress

      - name: Extract onedir GUI tree
        shell: powershell
        run: |
          # The build job uploaded WireSeal-windows-x86_64-onedir.zip which
          # contains the full dist/WireSeal/ directory (onedir PyInstaller output).
          # NSIS will install the extracted tree with `File /r`.
          Expand-Archive `
            -Path "dist\release\WireSeal-windows-x86_64-onedir.zip" `
            -DestinationPath "dist\release\extracted" `
            -Force
          Get-ChildItem "dist\release\extracted\WireSeal" | Select-Object -First 10
          if (-not (Test-Path "dist\release\extracted\WireSeal\WireSeal.exe")) {
            Write-Error "WireSeal.exe missing from extracted onedir tree"
            exit 1
          }

      - name: Build NSIS installer
        shell: powershell
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $nsis    = "C:\Program Files (x86)\NSIS\makensis.exe"
          $guiDir  = (Resolve-Path "dist\release\extracted\WireSeal").Path
          $cliSrc  = (Resolve-Path "dist\release\wireseal-cli-windows-x86_64.exe").Path
          & $nsis /DVERSION="$version" "/DSRCDIR=$guiDir" "/DCLIBINARY=$cliSrc" installer\wireseal.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build .zip (portable — onedir GUI tree + CLI)
        shell: powershell
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          # Stage both the full onedir GUI tree and the CLI exe into a
          # single portable zip. Users unzip to any location and run
          # WireSeal\WireSeal.exe.
          $stage = "dist\release\portable-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse -Force "dist\release\extracted\WireSeal" "$stage\WireSeal"
          Copy-Item -Force "dist\release\wireseal-cli-windows-x86_64.exe" "$stage\wireseal-cli.exe"
          Compress-Archive `
            -Path "$stage\*" `
            -DestinationPath "dist\release\wireseal-${version}-windows-x86_64.zip" `
            -Force
          Remove-Item -Recurse -Force $stage

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/release/*-setup.exe
            dist/release/*.zip

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Sign all artifacts with Sigstore (keyless) and publish to GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  sign-and-release:
    needs: [build, package-linux, package-macos, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/release/

      - name: Drop intermediate Windows onedir zip
        run: |
          # WireSeal-windows-x86_64-onedir.zip is an intermediate artifact
          # consumed only by the package-windows job (via `File /r` in NSIS).
          # It's not a user-facing download — the NSIS installer and the
          # renamed portable zip (wireseal-<ver>-windows-x86_64.zip) supersede it.
          rm -f dist/release/WireSeal-windows-x86_64-onedir.zip

      - name: Generate SHA-256 checksums
        run: |
          cd dist/release
          sha256sum * > sha256sums.txt
          echo "=== sha256sums.txt ===" && cat sha256sums.txt

      - name: Copy install scripts to release
        run: |
          cp scripts/wireseal-linux.sh dist/release/
          cp scripts/wireseal-macos.sh dist/release/
          cp scripts/wireseal-windows.ps1 dist/release/

      - name: Upload all files to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/release/* \
            --clobber --repo "${{ github.repository }}"
