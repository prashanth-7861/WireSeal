name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build raw standalone binaries (PyInstaller one-file, dashboard bundled)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wireseal-linux-x86_64
          - os: macos-latest
            artifact_name: wireseal-macos-arm64
          - os: windows-latest
            artifact_name: wireseal-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React dashboard
        working-directory: Dashboard
        run: |
          npm ci
          npm run build

      - name: Install Linux WebKit (for pywebview GUI)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libwebkit2gtk-4.0-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with hash verification)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Install package
        run: pip install -e .

      - name: Run unit tests before release build
        run: pytest --tb=short -q -m "not integration"
        env:
          WG_ENFORCE_TIMING: "1"

      - name: Build standalone binary (with bundled dashboard)
        run: pyinstaller wireseal.spec

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist/release
          find dist -maxdepth 1 \( -name "wireseal" -o -name "wireseal.exe" \) \
            -exec cp {} dist/release/${{ matrix.artifact_name }} \;

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release/${{ matrix.artifact_name }}

  # ─────────────────────────────────────────────────────────────────────────
  # 2a. Linux packages — .deb (Debian/Ubuntu) and .rpm (Fedora/RHEL/Rocky)
  # ─────────────────────────────────────────────────────────────────────────
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: wireseal-linux-x86_64
          path: dist/release

      - name: Make binary executable
        run: chmod +x dist/release/wireseal-linux-x86_64

      - name: Compute version (strip leading 'v')
        id: ver
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Install fpm and rpm tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Prepare payload directory
        run: |
          mkdir -p pkg_root/usr/local/bin
          cp dist/release/wireseal-linux-x86_64 pkg_root/usr/local/bin/wireseal
          chmod +x pkg_root/usr/local/bin/wireseal

      - name: Build .deb package (Debian / Ubuntu)
        run: |
          fpm \
            -s dir \
            -t deb \
            -C pkg_root \
            --name wireseal \
            --version "${{ steps.ver.outputs.version }}" \
            --architecture amd64 \
            --description "WireGuard server automation with zero plaintext secrets on disk" \
            --url "https://github.com/prashanth-7861/WireSeal" \
            --maintainer "WireSeal Contributors <noreply@github.com>" \
            --license MIT \
            --category net \
            --depends wireguard-tools \
            --depends "libwebkit2gtk-4.0-37 | libwebkit2gtk-4.1-0" \
            --deb-priority optional \
            --package "dist/release/wireseal_${{ steps.ver.outputs.version }}_amd64.deb" \
            .

      - name: Build .rpm package (Fedora / RHEL / Rocky / openSUSE)
        run: |
          fpm \
            -s dir \
            -t rpm \
            -C pkg_root \
            --name wireseal \
            --version "${{ steps.ver.outputs.version }}" \
            --architecture x86_64 \
            --description "WireGuard server automation with zero plaintext secrets on disk" \
            --url "https://github.com/prashanth-7861/WireSeal" \
            --maintainer "WireSeal Contributors <noreply@github.com>" \
            --license MIT \
            --category "Applications/Internet" \
            --depends wireguard-tools \
            --depends webkit2gtk3 \
            --package "dist/release/wireseal-${{ steps.ver.outputs.version }}-1.x86_64.rpm" \
            .

      - name: Build .tar.gz (Arch Linux / Alpine / generic)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          tar -czf "dist/release/wireseal-${VERSION}-linux-x86_64.tar.gz" \
            -C pkg_root/usr/local/bin wireseal

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/release/*.deb
            dist/release/*.rpm
            dist/release/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # 2b. macOS package — .pkg installer + plain .tar.gz
  # ─────────────────────────────────────────────────────────────────────────
  package-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: wireseal-macos-arm64
          path: dist/release

      - name: Make binary executable
        run: chmod +x dist/release/wireseal-macos-arm64

      - name: Compute version
        id: ver
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Build .pkg installer
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          mkdir -p payload/usr/local/bin
          cp dist/release/wireseal-macos-arm64 payload/usr/local/bin/wireseal
          chmod +x payload/usr/local/bin/wireseal

          pkgbuild \
            --root payload \
            --identifier com.wireseal.cli \
            --version "$VERSION" \
            --install-location / \
            dist/release/wireseal-component.pkg

          cat > /tmp/distribution.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>WireSeal</title>
            <options customize="never" require-scripts="false" hostArchitectures="arm64"/>
            <pkg-ref id="com.wireseal.cli"/>
            <choices-outline>
              <line choice="com.wireseal.cli"/>
            </choices-outline>
            <choice id="com.wireseal.cli" visible="false">
              <pkg-ref id="com.wireseal.cli"/>
            </choice>
            <pkg-ref id="com.wireseal.cli" version="${VERSION}" onConclusion="none">wireseal-component.pkg</pkg-ref>
          </installer-gui-script>
          EOF

          productbuild \
            --distribution /tmp/distribution.xml \
            --package-path dist/release \
            "dist/release/wireseal-${VERSION}-macos-arm64.pkg"

          rm dist/release/wireseal-component.pkg

      - name: Build .tar.gz (Homebrew / manual install)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p tarball_root/bin
          cp dist/release/wireseal-macos-arm64 tarball_root/bin/wireseal
          chmod +x tarball_root/bin/wireseal
          tar -czf "dist/release/wireseal-${VERSION}-macos-arm64.tar.gz" \
            -C tarball_root/bin wireseal

      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            dist/release/*.pkg
            dist/release/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # 2c. Windows installer — NSIS .exe setup wizard + plain .zip
  # ─────────────────────────────────────────────────────────────────────────
  package-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: wireseal-windows-x86_64.exe
          path: dist/release

      - name: Compute version
        id: ver
        shell: bash
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Install NSIS
        shell: powershell
        run: choco install nsis --yes --no-progress

      - name: Build NSIS installer
        shell: powershell
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $nsis    = "C:\Program Files (x86)\NSIS\makensis.exe"
          $src     = (Resolve-Path "dist\release\wireseal-windows-x86_64.exe").Path
          & $nsis /DVERSION="$version" "/DSRCBINARY=$src" installer\wireseal.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build .zip (portable / manual install)
        shell: powershell
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path "dist\release\wireseal-windows-x86_64.exe" `
            -DestinationPath "dist\release\wireseal-${version}-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/release/*-setup.exe
            dist/release/*.zip

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Sign all artifacts with Sigstore (keyless) and publish to GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  sign-and-release:
    needs: [build, package-linux, package-macos, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # upload to GitHub Release
      id-token: write    # Sigstore keyless OIDC signing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/release/

      - name: Generate SHA-256 checksums
        run: |
          cd dist/release
          sha256sum * > sha256sums.txt
          echo "=== sha256sums.txt ===" && cat sha256sums.txt

      - name: Sign with Sigstore CLI (keyless — no stored private key)
        run: |
          pip install --quiet sigstore
          cd dist/release
          sigstore sign \
            wireseal-linux-x86_64 \
            wireseal-macos-arm64 \
            wireseal-windows-x86_64.exe \
            wireseal_*_amd64.deb \
            wireseal-*-1.x86_64.rpm \
            wireseal-*-linux-x86_64.tar.gz \
            wireseal-*-macos-arm64.pkg \
            wireseal-*-macos-arm64.tar.gz \
            wireseal-*-windows-x86_64-setup.exe \
            wireseal-*-windows-x86_64.zip

      - name: Upload all files to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/release/* \
            --clobber --repo "${{ github.repository }}"
